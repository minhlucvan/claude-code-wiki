name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          TMPDIR=$(mktemp -d)

          # Try cloning existing wiki, or initialize a new one
          if git clone "$WIKI_URL" "$TMPDIR" 2>/dev/null; then
            echo "Cloned existing wiki repo."
          else
            echo "Wiki repo not found. Initializing..."
            cd "$TMPDIR"
            git init
            git checkout -b master
            cd -
          fi

          # Configure git
          cd "$TMPDIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove old wiki pages (except .git)
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +

          # Copy new wiki pages
          cp "${{ github.workspace }}"/wiki/*.md .

          # Commit and push
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to wiki."
          else
            git commit -m "Update wiki from repo ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git remote remove origin 2>/dev/null || true
            git remote add origin "$WIKI_URL"
            git push -u origin master || git push -u origin main
            echo "Wiki published successfully!"
          fi
